syntax = "proto3";

package payment;

option go_package = "github.com/B4rt0n1/protoB/payment";

message PaymentRequest {
  string order_id = 1;
  int64 amount = 2;
}

message PaymentResponse {
  string status = 1;
  string transaction_id = 2;
}

// --- NEW CODE BELOW ---

message ListPaymentsRequest {
  int64 min_amount = 1; // in cents, 0 = unlimited
  int64 max_amount = 2; // in cents, 0 = unlimited
}

message ListPaymentsResponse {
  repeated PaymentResponse payments = 1;
}

service PaymentService {
  rpc ProcessPayment(PaymentRequest) returns (PaymentResponse);
  rpc ListPayments(ListPaymentsRequest) returns (ListPaymentsResponse); // new
}